name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web:
    name: Typecheck, lint, and build web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  ingestion:
    name: Validate ingestion scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile ingestion scripts
        run: python -m py_compile pipelines/ingest/scripts/normalize_courtlistener_seed.py pipelines/ingest/scripts/write_web_seed.py pipelines/ingest/scripts/import_source_proposals.py pipelines/ingest/scripts/validate_source_registry.py

      - name: Validate source registry
        run: python pipelines/ingest/scripts/validate_source_registry.py --registry data/sources/legal-data-sources.json

      - name: Run normalization smoke test
        run: python pipelines/ingest/scripts/normalize_courtlistener_seed.py --input pipelines/ingest/samples/courtlistener_opinions_sample.json --output data/normalized/cases.seed.json

      - name: Run web seed smoke test
        run: python pipelines/ingest/scripts/write_web_seed.py --input data/normalized/cases.seed.json --output apps/web/data/generated/cases.generated.json

      - name: Run source proposal import smoke test
        run: python pipelines/ingest/scripts/import_source_proposals.py --registry data/sources/legal-data-sources.json --proposals pipelines/ingest/samples/source_proposals_sample.json --output data/sources/legal-data-sources.proposed.json
